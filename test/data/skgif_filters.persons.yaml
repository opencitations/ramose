identifiers.id:
  filter: '?local_identifier datacite:hasIdentifier [ literal:hasLiteralValue "{{value}}"^^<http://www.w3.org/2001/XMLSchema#string> ] .'
identifiers.scheme:
  filter: "?local_identifier datacite:hasIdentifier [ datacite:usesIdentifierScheme datacite:{{value}} ] ."
given_name:
  filter: "?local_identifier foaf:givenName '{{value}}' . "
family_name:
  filter: "?local_identifier foaf:familyName '{{value}}'. "
name:
  filter: "?local_identifier foaf:name '{{value}}'. "
affiliations.affiliation.local_identifier:
  filter: "FILTER(false)"
affiliations.affiliation.name:
  filter: "FILTER(false)"
affiliations.affiliation.short_name:
  filter: "FILTER(false)"
affiliations.role:
  filter: "FILTER(false)" 
cf.search.family_name:
  filter: |-
    ?local_identifier foaf:familyName ?familyName .
    FILTER(CONTAINS(LCASE(?familyName), LCASE("{{value}}")))
cf.search.given_name:
  filter: |-
    ?local_identifier foaf:givenName ?givenName .
    FILTER(CONTAINS(LCASE(?givenName), LCASE("{{value}}")))
cf.search.name:
  filter: |-
    ?local_identifier foaf:name ?name .
    FILTER(CONTAINS(LCASE(?name), LCASE("{{value}}")))
