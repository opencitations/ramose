[project]
name = "ramose"
version = "1.0.8"
description = "Restful API Manager Over SPARQL Endpoints (RAMOSE) is an application that allows agile development and publication of documented RESTful APIs for querying SPARQL endpoints, according to a particular specification document."
authors = [
    { name = "essepuntato", email = "essepuntato@gmail.com" },
]
license = { text = "ISC" }
requires-python = ">=3.10"
dependencies = [
    "flask>=3.0",
    "isodate>=0.6.1",
    "markdown>=3.6",
    "python-dateutil>=2.8.2",
    "rdflib>=6.1.1",
    "requests>=2.22.0",
]

[project.urls]
Repository = "https://github.com/opencitations/ramose/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.coverage.run]
source = ["ramose"]

[tool.coverage.report]
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]

[dependency-groups]
dev = [
    "coverage>=7.13.0",
    "genbadge[coverage]>=1.1.3",
    "pyright>=1.1.408",
    "pytest>=9.0.2",
]
