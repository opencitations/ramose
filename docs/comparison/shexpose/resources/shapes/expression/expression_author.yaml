id: https://w3id.org/oc/meta/
name: expression
prefixes:
  pro: http://purl.org/spar/pro/
  foaf: http://xmlns.com/foaf/0.1/
  fabio: http://purl.org/spar/fabio/
  ex: https://w3id.org/oc/meta/
  rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  xsd: http://www.w3.org/2001/XMLSchema#
default_prefix: ex
classes:
  Expression:
    class_uri: fabio:Expression
    slots:
      - contributor
  RoleInTime:
    class_uri: pro:RoleInTime
    slots:
      - agent
  Agent:
    class_uri: foaf:Agent
    slots:
      - familyName
      - givenName
slots:
  contributor:
    slot_uri: pro:isDocumentContextFor
    range: RoleInTime
  agent:
    slot_uri: pro:isHeldBy
    range: Agent
  familyName:
    slot_uri: foaf:familyName
    range: string
  givenName:
    slot_uri: foaf:givenName
    range: string
types:
  string:
    base: str
    uri: xsd:string
